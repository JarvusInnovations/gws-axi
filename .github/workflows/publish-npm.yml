name: Publish npm package

on:
  release:
    types: [published]


jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Upgrade npm for trusted publishing
      # Pin to npm 11.x — `@latest` intermittently ships with a broken
      # dependency tree (promise-retry MODULE_NOT_FOUND) on GitHub runners.
      run: npm install -g npm@11

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.11'

    - name: Resolve release tag
      run: |
        echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Set package.json version from tag
      run: npm version --no-git-tag-version --allow-same-version "${RELEASE_TAG#v}"

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build
      run: bun run build

    - name: Publish to npm
      run: npm publish --provenance --access public
